services:
  - type: web
    name: career-launcher-backend
    env: node
    plan: free
    buildCommand: "npm install && npm run prisma:generate"
    startCommand: "node src/backend/server.js"
    envVars:
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        value: postgresql://user:password@neon-domain/dbname?sslmode=require
      - key: JWT_SECRET
        value: your-secure-jwt-secret-key-here
      - key: TWILIO_ACCOUNT_SID
        value: ACyouraccountidhereplaceholder0000
      - key: TWILIO_AUTH_TOKEN
        value: yourtwiliotokenplaceholder000000
      - key: TWILIO_FROM_NUMBER
        value: "+15550000000"
